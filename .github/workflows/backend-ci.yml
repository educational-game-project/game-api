name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Build-Image:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.head_commit.message, '#build') }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Get Short SHA
        id: vars
        shell: bash
        run: |
          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_ENV

      - id: qemu
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - id: buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - id: auth
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - id: build
        name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # context: .
          push: true
          tags: iwansuryaningrat/game-api:game-${{ env.COMMIT_SHORT_SHA }}

      - id: buildSkripsi
        name: Build and Push Skripsi Image
        uses: docker/build-push-action@v5
        with:
          # context: .
          push: true
          tags: iwansuryaningrat/game-api:game-skripsi

  Deploy-to-VM:
    runs-on: ubuntu-latest
    needs: Build-Image
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            set -e

            echo "➡️ Pull latest image"
            docker pull iwansuryaningrat/game-api:game-skripsi

            echo "➡️ Restart container"
            cd ~/game-deploy

            docker compose down
            docker compose up -d

            echo "✅ Deploy success"

          EOF
